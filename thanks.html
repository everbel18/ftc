<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You! - Free Tour Cartagena</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ffcc00;
            --dark-color: #14213d;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Lato', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: white;
            background-color: #000;
        }
        /* Collage Background */
        .collage-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            padding: 8px;
            z-index: -2;
        }
        .collage-bg div {
            background-size: cover;
            background-position: center;
            filter: brightness(0.5);
            border-radius: 4px;
        }
        .img1 { background-image: url('images/old-city-6.jpg'); }
        .img2 { background-image: url('images/getsemani.jpg'); background-position: center 90% !important; }
        .img3 { background-image: url('images/guias.jpg'); }
        .img4 { background-image: url('images/palenque.jpeg'); }
        .img5 { background-image: url('images/santa-teresa.jpg'); }
        .img6 { background-image: url('images/bazurto.jpg'); }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(20,33,61,0.3) 0%, rgba(20,33,61,0.7) 100%);
            z-index: -1;
        }

        .content {
            max-width: 650px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: -1px;
            line-height: 1;
        }

        p {
            font-size: 1.4rem;
            line-height: 1.5;
            margin-bottom: 2.5rem;
            font-weight: 400;
        }

        .btn-back {
            display: inline-block;
            padding: 1.2rem 3.5rem;
            background-color: var(--primary-color);
            color: var(--dark-color);
            text-decoration: none;
            font-weight: 900;
            font-size: 1.2rem;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-shadow: none;
        }

        .btn-back:hover {
            transform: translateY(-5px);
            background-color: white;
            box-shadow: 0 15px 30px rgba(0,0,0,0.6);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            p { font-size: 1.1rem; }
            .collage-bg { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18088379600"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18088379600');
      
      // Solo dispara la conversión si hay un ID de reserva real y no se ha contado antes
      const _urlParams = new URLSearchParams(window.location.search);
      const _resId = _urlParams.get('id');
      if (_resId && !localStorage.getItem('conv_' + _resId)) {
          gtag('event', 'conversion', {
              'send_to': 'AW-18088379600/fmqICPHt5JscENCJm7FD',
              'value': 1.0,
              'currency': 'COP'
          });
          localStorage.setItem('conv_' + _resId, '1');
      }
    </script>
</head>
<body>
    <div class="collage-bg">
        <div class="img1"></div>
        <div class="img2"></div>
        <div class="img3"></div>
        <div class="img4"></div>
        <div class="img5"></div>
        <div class="img6"></div>
    </div>
    <div class="overlay"></div>

    <div class="content">
        <h1>Thank You!</h1>
        <p>Your booking has been received. Please check your email for your booking confirmation.</p>
        
        <!-- Reservation ID Box -->
        <div id="reservation-info" style="margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); display: none;">
            <p style="font-size: 0.9rem; margin-bottom: 5px; opacity: 0.7;">Booking ID:</p>
            <h2 id="res-id-display" style="font-size: 1.8rem; color: #ffffff; letter-spacing: 2px; margin-bottom: 0; font-weight: 700;">------</h2>
        </div>

        <div class="button-group">
            <a href="https://maps.app.goo.gl/eVhXSZ4ovLQCzmcj7" target="_blank" class="btn-back">SEE MEETING POINT</a>
            <a href="index.html" class="btn-back" style="background-color: white;">BACK TO HOME</a>
        </div>

        <!-- Discreet Cancellation Link -->
        <div style="margin-top: 40px; opacity: 0.6; font-size: 0.85rem;">
            Changed your plans? <a href="index.html?cancel=true" id="cancel-link" style="color: white; text-decoration: underline;">Cancel your booking here</a>
        </div>
    </div>

    <script>
        // Read ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const resId = urlParams.get('id');
        if (resId) {
            document.getElementById('res-id-display').innerText = resId;
            document.getElementById('reservation-info').style.display = 'block';
        }
    </script>
</body>
</html>
